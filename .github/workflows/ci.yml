# QUAL-01: CI gate — typecheck + tests on every push/PR to main.
#  - test:        fast unit tests (no database)
#  - integration: DB-backed tests against a throwaway Postgres service
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Generate Prisma client
        run: npx prisma generate
      - name: Typecheck
        run: npm run typecheck
      - name: Unit tests
        run: npm test

  integration:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_PASSWORD: test
          POSTGRES_DB: eventflow_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d eventflow_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      TEST_DATABASE_URL: postgresql://postgres:test@localhost:5432/eventflow_test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Generate Prisma client
        run: npx prisma generate
      - name: Apply migrations to the test database
        run: npx prisma migrate deploy
        env:
          DATABASE_URL: postgresql://postgres:test@localhost:5432/eventflow_test
      - name: Integration tests (seat reservation, session epoch)
        run: npm run test:integration

  # QUAL-02: browser smoke tests over the core money/identity flows against a
  # built app + a seeded throwaway Postgres. Catches silent UI/flow rewrites.
  e2e:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_PASSWORD: test
          POSTGRES_DB: eventflow_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d eventflow_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      # next start runs in production mode, so the auth guard requires real
      # (non-fallback) secrets. These are throwaway CI values.
      DATABASE_URL: postgresql://postgres:test@localhost:5432/eventflow_test
      JWT_SECRET: ci-e2e-jwt-secret-not-a-real-key-0123456789
      QR_SECRET: ci-e2e-qr-secret-not-a-real-key-98765432100
      NEXT_PUBLIC_APP_URL: http://localhost:3000
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Generate Prisma client
        run: npx prisma generate
      - name: Apply migrations to the test database
        run: npx prisma migrate deploy
      - name: Seed fixtures (org, organizer, published event)
        run: npm run seed
      - name: Build the app
        run: npm run build
      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium
      - name: Run e2e smoke tests
        run: npm run test:e2e
      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

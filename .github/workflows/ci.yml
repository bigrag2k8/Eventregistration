# QUAL-01: CI gate — typecheck + unit tests on every push/PR to main.
# Unit tests only (no database); DB-backed integration tests are a separate
# job to be added when a Postgres service is wired into CI.
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm test

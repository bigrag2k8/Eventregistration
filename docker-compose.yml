# LOCAL DEVELOPMENT ONLY. Do NOT deploy this file to staging or production —
# production runs on managed Railway Postgres/Redis with their own credentials.
# POSTGRES_PASSWORD has no default and must be supplied via a git-ignored .env
# (see .env.example); compose refuses to start without it. Your local
# DATABASE_URL must use the same password, e.g.:
#   DATABASE_URL=postgresql://eventflow:${POSTGRES_PASSWORD}@db:5432/eventflow
services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: eventflow
      POSTGRES_USER: eventflow
      # SEC-10: no weak default — must be set in .env (compose errors if missing).
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env}
    ports: ["5432:5432"]
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U eventflow -d eventflow"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports: ["6379:6379"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  web:
    build: .
    restart: unless-stopped
    env_file: .env
    depends_on:
      db: { condition: service_healthy }
      redis: { condition: service_healthy }
    ports: ["3000:3000"]
    # npm start runs `prisma migrate deploy` (with one-time 0_init baseline) then
    # `next start` — the web service owns migrations, same as production.
    command: sh -c "npm start"

  worker:
    build: .
    restart: unless-stopped
    env_file: .env
    depends_on:
      db: { condition: service_healthy }
      redis: { condition: service_healthy }
    # The web service applies migrations; the worker just runs (matches prod).
    command: sh -c "npx tsx src/server/worker.ts"

volumes:
  pgdata:
